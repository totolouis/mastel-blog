  function cardHTML(item) {
    var img = '/mastel-blog/images/' + item.s;
    if (item.e) img += '.' + item.e;
    return '<a href="' + item.u + '" class="card">'
      + '<div class="card__image-wrap">'
      + '<div class="card__image hover-article-effect" style="background-image: url('' + img + '')"></div>'
      + '</div>'
      + '<div class="card__content">'
      + '<h3 class="card__title">' + item.t + '</h3>'
      + '<span class="card__date">' + item.d + '</span>'
      + '</div>'
      + '</a>';
  }

  function renderPage(section, page) {
    var items = data[section];
    var total = items.length;
    var pages = Math.ceil(total / PAGE_SIZE);
    var start = (page - 1) * PAGE_SIZE;
    var end = Math.min(start + PAGE_SIZE, total);
    var grid = document.getElementById('grid-' + section);
    var html = '';
    for (var i = start; i < end; i++) {
      html += cardHTML(items[i]);
    }
    grid.innerHTML = html;
    renderPagination(section, page, pages);
  }

  function renderPagination(section, page, pages) {
    var grid = document.getElementById('grid-' + section);
    var existing = grid.parentNode.querySelector('.pagination');
    if (existing) existing.remove();
    if (pages <= 1) return;

    var nav = document.createElement('div');
    nav.className = 'pagination';
    for (var p = 1; p <= pages; p++) {
      (function(pageNum) {
        var btn = document.createElement('button');
        btn.className = 'page-btn' + (pageNum === page ? ' page-btn--active' : '');
        btn.textContent = pageNum;
        btn.addEventListener('click', function() {
          currentPage[section] = pageNum;
          renderPage(section, pageNum);
        });
        nav.appendChild(btn);
      })(p);
    }
    grid.parentNode.appendChild(nav);
  }

  function activate(section) {
    activeSection = section;
    var tabs = document.querySelectorAll('.tab');
    var contents = document.querySelectorAll('.section-content');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle('tab--active', tabs[i].getAttribute('data-section') === section);
    }
    for (var i = 0; i < contents.length; i++) {
      contents[i].classList.toggle('section-content--active', contents[i].getAttribute('data-section') === section);
    }
    renderPage(section, currentPage[section]);
  }

  
  renderPage('podcasts', 1);

  
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function(e) {
      activate(this.getAttribute('data-section'));
    });
  }
})();
